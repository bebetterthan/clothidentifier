# ============================================================
# nginx.conf — Clothing Classifier reverse proxy
# Port 80 HTTP (ESP32-CAM tidak support HTTPS native)
# ============================================================

# Rate limit zone: 10 req/min per IP (ESP32 kirim 6r/m, burst 5)
limit_req_zone $binary_remote_addr zone=esp32:10m rate=10r/m;

server {
    listen      80;
    server_name _;

    access_log /var/log/nginx/clothing_access.log combined;
    error_log  /var/log/nginx/clothing_error.log warn;

    # Max upload: toleransi gambar besar dari ESP32-CAM
    client_max_body_size 10m;

    # Gzip untuk response JSON
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_min_length 256;

    # Inject tracking headers ke setiap response
    add_header X-Request-ID    $request_id      always;
    add_header X-Response-Time "${request_time}s" always;

    # ---- Main proxy ----
    location / {
        limit_req zone=esp32 burst=5 nodelay;

        proxy_pass              http://127.0.0.1:8000;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Request-ID      $request_id;

        proxy_connect_timeout   10s;
        proxy_read_timeout      30s;
        proxy_send_timeout      10s;
    }

    # ---- Health check — relaxed rate limit ----
    location /health {
        limit_req zone=esp32 burst=10 nodelay;

        proxy_pass            http://127.0.0.1:8000/health;
        proxy_connect_timeout 5s;
        proxy_read_timeout    5s;
        proxy_send_timeout    5s;

        add_header X-Response-Time "${request_time}s" always;
    }
}
